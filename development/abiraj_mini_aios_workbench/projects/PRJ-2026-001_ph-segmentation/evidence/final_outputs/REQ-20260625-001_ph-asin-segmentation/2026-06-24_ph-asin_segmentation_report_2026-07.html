function segCount(seg){
  if(curPH==="ALL") return D.segTotal[seg];

  return ({HHH:s.hhh,HHL:s.hhl,HLH:s.hlh,LHH:s.lhh,LLH:s.llh,LLL:s.lll})[seg];
}

function card(a){const m=D.seg[a.seg];const[mc,ar,mt]=mvMeta(a.mv);

  </div>`;}

function phBlock(ph,rows){
  const total=rows.length, done=rows.filter(r=>ticks[k(r)]).length;
  const pctw=total?Math.round(done/total*100):0;
  let cfg="";const cf=cfgFor(ph);

     (c.needs_manual&&c.bm_impression===null?`<span class="man">manual \u2014 &lt;10 sellers</span>`:

     `</div>`).join("")+`</div>`;
  return `<div class="phblock"><div class="phhead"><div class="nm">${ph}</div>

}

function render(){

    const c=t.querySelector(".cnt"); if(c) c.textContent=segCount(t.dataset.seg);

  const m=D.seg[curSeg];
  document.getElementById("plan").innerHTML=`<div class="plan" style="background:${m.card};border:1px solid ${m.tab}33">

  let rows=D.asins.filter(a=>a.seg===curSeg && (curPH==="ALL"||a.ph===curPH));

  const phs=[...new Set(rows.map(r=>r.ph))].sort();
  main.innerHTML=banner+phs.map(ph=>phBlock(ph,rows.filter(r=>r.ph===ph))).join("");
}

function importTicks(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();
