  t.innerHTML=`${s} <span class="cnt">${D.segTotal[s]}</span>`;
  t.onclick=()=>{curSeg=s;render()};tabs.appendChild(t)});

const pl=document.getElementById("phlist");
const allItem=document.createElement("div");allItem.className="ph-item";allItem.dataset.ph="ALL";
allItem.innerHTML=`<span>\u25CF All PHs</span>`;allItem.onclick=()=>{curPH="ALL";render()};pl.appendChild(allItem);
D.summary.forEach(s=>{const it=document.createElement("div");it.className="ph-item";it.dataset.ph=s.user_name;
  it.innerHTML=`<span>${s.user_name}</span><span class="pct ${s.lll_pct>30?'hot':''}">${s.lll_pct}%</span>`;
  it.onclick=()=>{curPH=s.user_name;render()};pl.appendChild(it)});

function segCount(seg){
  if(curPH==="ALL") return D.segTotal[seg];
  const s=D.summary.find(x=>x.user_name===curPH);
  if(!s) return 0;
  return ({HHH:s.hhh,HHL:s.hhl,HLH:s.hlh,LHH:s.lhh,LLH:s.llh,LLL:s.lll})[seg];
}
const mvMeta=m=>({IMPROVED:["up","\u2191","Improved"],SAME:["same","\u2192","Same segment"],DECLINED:["down","\u2193","Declined"],NEW:["new","\u2605","New ASIN"]}[m]);
const cfgFor=ph=>D.config.filter(c=>c.user_name===ph);

function card(a){const m=D.seg[a.seg];const[mc,ar,mt]=mvMeta(a.mv);
  const ck=k(a);const done=!!ticks[ck];
  const acls=a.acct.indexOf("LED")===0?"led":"dcv";
  const mvtxt=a.mv==="SAME"?`${ar} Same segment as last month`:(a.mv==="NEW"?`${ar} New ASIN this month`:`${ar} ${mt} from ${a.prev}`);
  return `<div class="card${done?' done':''}" style="--c:${m.tab};background:${m.card}">
    <div class="r1"><div><span class="asin">${a.asin}</span><span class="acct ${acls}">${a.acct}</span>
      <div class="cat">${a.cat}</div></div><span class="segb">${a.seg}</span></div>
    <div class="sku">SKU: ${a.sku}</div>
    <div class="mv ${mc}">${mvtxt}</div>
    <div class="met"><span class="lbl">Impr</span> ${a.imp.toLocaleString()} &nbsp;\u00b7&nbsp; <span class="lbl">Clicks</span> ${a.clk.toLocaleString()} &nbsp;\u00b7&nbsp; <span class="lbl">CVR</span> ${a.cvr}%</div>
    <div class="bm">Benchmark: Imp ${a.bi?Number(a.bi).toLocaleString():'\u2014'} \u00b7 Clk ${a.bc??'\u2014'} \u00b7 CVR ${a.bv??'\u2014'}%</div>
    ${a.mn?'<span class="man">\u26A0 manual benchmark (&lt;10 sellers in category)</span>':''}
    <div class="cardfoot"><button class="donebtn${done?' on':''}" onclick="toggleDone('${ck.replace(/'/g,"")}')">${done?'\u2713 Done':'Mark done'}</button></div>
  </div>`;}

function phBlock(ph,rows){
  const total=rows.length, done=rows.filter(r=>ticks[k(r)]).length;
  const pctw=total?Math.round(done/total*100):0;
  let cfg="";const cf=cfgFor(ph);
  if(cf.length) cfg=`<div class="cfg">`+cf.map(c=>`<div class="ct"><b>${c.category_name}</b><br>`+
     (c.needs_manual&&c.bm_impression===null?`<span class="man">manual \u2014 &lt;10 sellers</span>`:
      `Imp \u2265 <b>${Number(c.bm_impression).toLocaleString()}</b> \u00b7 Clk \u2265 <b>${c.bm_click}</b> \u00b7 CVR \u2265 <b>${c.bm_cvr_pct}%</b><br><span style="color:#8a95a3">Top ${c.topn} sold${c.needs_manual?' \u00b7 \u26A0 manual':''}</span>`)+
     `</div>`).join("")+`</div>`;
  return `<div class="phblock"><div class="phhead"><div class="nm">${ph}</div>
    <div class="prog">${done} / ${total} actioned in ${curSeg}<div class="bar"><span style="width:${pctw}%;background:${D.seg[curSeg].tab}"></span></div></div></div>
    ${cfg}<div class="cards">${rows.map(card).join("")}</div></div>`;
}

function render(){
  document.querySelectorAll(".tab").forEach(t=>{
    t.classList.toggle("active",t.dataset.seg===curSeg);
    const c=t.querySelector(".cnt"); if(c) c.textContent=segCount(t.dataset.seg);
  });
  document.querySelectorAll(".ph-item").forEach(t=>t.classList.toggle("active",t.dataset.ph===curPH));
  const m=D.seg[curSeg];
  const ki=m.plan.indexOf("Kill:");
  const planHtml = ki>=0
    ? m.plan.slice(0,ki).trim()+`<span class="kill"><b>\u26A0 Kill criteria \u2014 </b>${m.plan.slice(ki+5).trim()}</span>`
    : m.plan;
  document.getElementById("plan").innerHTML=`<div class="plan" style="background:${m.card};border:1px solid ${m.tab}33">
     <div class="ptitle"><span class="pp" style="background:${m.tab}">${curSeg} \u00b7 ${m.prio}</span> ${m.name}</div>${planHtml}</div>`;
  let rows=D.asins.filter(a=>a.seg===curSeg && (curPH==="ALL"||a.ph===curPH));
  const main=document.getElementById("main");
  let banner="";
  if(curSeg==="LLL") banner=`<div class="note">LLL has <b>${D.segTotal.LLL.toLocaleString()}</b> ASINs total. This view shows the <b>${D.lllShown}</b> that <b>declined</b> or are <b>new</b> this month (the \u00a78 priority set). The complete LLL list per PH lives in <b>analytics.ph_segment_report</b> for the dashboard phase.</div>`;
  if(!rows.length){main.innerHTML=banner+`<div class="empty">No ASINs in ${curSeg}${curPH!=="ALL"?" for "+curPH:""}.</div>`;return;}
  const phs=[...new Set(rows.map(r=>r.ph))].sort();
  main.innerHTML=banner+phs.map(ph=>phBlock(ph,rows.filter(r=>r.ph===ph))).join("");
}
function tick(key,val){ticks[key]=val;if(!val)delete ticks[key];save();
  render();}
function toggleDone(key){tick(key,!ticks[key]);}
function exportTicks(){const b=new Blob([JSON.stringify(ticks,null,2)],{type:"application/json"});
  const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download="ph_segmentation_progress_"+D.meta.period.replace(/\s/g,"_")+".json";a.click();URL.revokeObjectURL(u);}
function importTicks(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();
  r.onload=()=>{try{ticks=JSON.parse(r.result)||{};save();render();}catch(x){alert("Invalid progress file")}};r.readAsText(f);}
function resetTicks(){if(confirm("Clear all ticks?")){ticks={};save();render();}}
render();
</script></body></html>
